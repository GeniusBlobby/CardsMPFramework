<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Clue</title>
	<link rel="stylesheet" href="/styles/base.css" />
	<link rel="stylesheet" href="/styles/menu.css" />
	<link rel="stylesheet" href="/styles/game-layout.css" />
	<link rel="stylesheet" href="/styles/game-table.css" />
	<link rel="stylesheet" href="/styles/game-cards.css" />
	<link rel="stylesheet" href="/styles/game-sidebar.css" />
	<link rel="stylesheet" href="/styles/game-chat.css" />
	<link rel="icon" type="image/x-icon" href="/favicon.ico" />
</head>

<body>
	<!-- MENU SCREEN -->
	<div id="menu" class="screen">
		<div class="menu-content">
			<div class="menu-header">
				<h1 class="game-title">
					<span class="title-english">Clue</span>
				</h1>
			</div>

			<div class="menu-main">
				<p class="menu-description">Enter a case code to join an existing mystery, or start a new case for your
					friends to join.</p>

				<div class="input-group name-group">
					<input type="text" id="player-name-input" placeholder="Your name" maxlength="20"
						autocomplete="off" />
				</div>

				<div class="input-group">
					<input type="text" id="room-code-input" placeholder="Enter 4 letter case code" maxlength="4"
						autocomplete="off" />
					<button id="join-game-btn" class="btn-primary">Join Case</button>
				</div>

				<div class="divider">or</div>

				<button id="create-game-btn" class="btn-secondary">Create Case</button>
			</div>
		</div>
		<div id="menu-error"></div>
	</div>

	<!-- NAME MODAL -->
	<div id="name-modal" class="modal hidden">
		<div class="modal-content">
			<h2>Enter Your Name</h2>
			<p>You need to set a name before joining a case.</p>
			<div class="form-group">
				<input type="text" id="modal-name-input" placeholder="Your name" maxlength="20" required />
			</div>
			<div id="modal-error" class="error"></div>
			<div class="modal-buttons">
				<button id="submit-name-btn" class="btn-primary">Confirm</button>
				<button id="close-modal" class="btn-secondary">Cancel</button>
			</div>
		</div>
	</div>

	<!-- LOBBY -->
	<div id="game" class="screen hidden">

		<!-- LEFT: Scoreboard Sidebar -->
		<div id="game-sidebar">
			<div id="sidebar-header">
				<button type="button" class="game-room-title" id="game-room-code">----</button>
			</div>

			<div id="scoreboard-section">
				<h3 class="sidebar-section-title">Scoreboard</h3>
				<div id="player-list"></div>
			</div>

			<div id="chat-section">
				<h3 class="sidebar-section-title">Chat</h3>
				<div id="chat-messages"></div>
			</div>

			<div id="chat-input-container">
				<input type="text" id="chat-input" placeholder="Say something!" maxlength="200" />
			</div>
		</div>

		<!-- CENTER: Case Area (table + evidence) -->
		<div id="game-area">
			<div id="notification-area">
				<div id="turn-banner" class="game-top-notification" style="display:none;"></div>
			</div>
			<div id="game-board-area">
				<img class="game-board" src="/assets/GameBoard.png" alt="Game Board">

				<div id="board-layer"></div>
				<div id="piece-layer"></div>
				<div id="ui-layer"></div>
			</div>
		</div>

		<div id="player-info">
			<div id="card-hand-area"></div>
			<div id="action-area">
				<div id="action-buttons"></div>
				<div id="pass-button"></div>
				<div id="dice-roll"></div>
				<div id="suggestions"></div>
				<div id="shown-cards"></div>
				<div id="accusation"></div>
				<div id="end-turn"></div>
				<div id="lies"></div>
			</div>
		</div>
	</div>

	<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
	<script type="module" src="/src/client.js"></script>
</body>

</html>
